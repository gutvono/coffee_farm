<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 44 44"
     width="44"
     height="44"
     fill="none">
  <!--
    Ícone do Coffee Farm ERP: grão de café estilizado dentro de uma folha.

    O SVG usa atributos width/height explícitos (44×44) para que o navegador
    conheça o tamanho intrínseco do arquivo mesmo antes do CSS carregar.
    O CSS em shared/style.css redimensiona a imagem para o tamanho adequado
    no header (32px).
  -->

  <!-- Folha / casca externa do grão -->
  <ellipse cx="22" cy="22" rx="15" ry="19" fill="#3b5239"/>

  <!-- Divisão esquerda do grão de café -->
  <path
    d="M22 5 C22 5 13 13 13 22 C13 31 22 39 22 39"
    stroke="#a9b8a2"
    stroke-width="1.6"
    fill="none"
    stroke-linecap="round"/>

  <!-- Divisão direita do grão de café -->
  <path
    d="M22 5 C22 5 31 13 31 22 C31 31 22 39 22 39"
    stroke="#a9b8a2"
    stroke-width="1.6"
    fill="none"
    stroke-linecap="round"/>

  <!-- Linha central (nervura do grão) -->
  <line
    x1="22" y1="5"
    x2="22" y2="39"
    stroke="#a9b8a2"
    stroke-width="1.2"
    stroke-linecap="round"/>
</svg>
