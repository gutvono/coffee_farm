<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" fill="none">
  <!-- Ícone: grão de café estilizado dentro de uma folha -->
  <g>
    <!-- Folha externa -->
    <ellipse cx="24" cy="24" rx="16" ry="20" fill="#3b5239"/>
    <!-- Grão de café (divisão interna) -->
    <path d="M24 6 C24 6 14 14 14 24 C14 34 24 42 24 42" stroke="#a9b8a2" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M24 6 C24 6 34 14 34 24 C34 34 24 42 24 42" stroke="#a9b8a2" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Linha central do grão -->
    <line x1="24" y1="6" x2="24" y2="42" stroke="#a9b8a2" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Texto: "Coffee Farm" em verde escuro -->
  <text x="52" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#3b5239">Coffee Farm</text>
  <!-- Texto: "ERP" em marrom, com espaçamento maior para dar destaque -->
  <text x="52" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#75442a" letter-spacing="3">ERP</text>
</svg>
